version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://evolution:evolution@evolution-db:5432/evolution
      - API_KEY=${EVOLUTION_API_KEY:-your-secret-api-key}
      - DISABLE_MANAGER=false
    volumes:
      - evolution_data:/evolution/storage
    networks:
      - evolution-network
    restart: unless-stopped

  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-postgres
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    networks:
      - evolution-network
    restart: unless-stopped

volumes:
  evolution_data:
  evolution_db_data:

networks:
  evolution-network:
    driver: bridge
