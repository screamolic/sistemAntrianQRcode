name: Hourly Notification Retry

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  retry-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger retry-notifications endpoint
        run: |
          curl -X POST https://sistem-antrian-qr.vercel.app/api/cron/retry-notifications \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
